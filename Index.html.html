const todayStr = () => new Date().toISOString().split("T")[0];
const fmt      = (d) => new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"});
const fmtTime  = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

const MOCK_HISTORY = [];

// ── Atoms ─────────────────────────────────────────────────────────────────────
const Badge = ({color,children,small}) => (
  <span style={{
    background:color+"22",color,border:`1px solid ${color}55`,
    borderRadius:4,padding:small?"1px 6px":"2px 9px",
    fontSize:small?10:11,fontFamily:"'Barlow Condensed',sans-serif",
    fontWeight:700,letterSpacing:.5,textTransform:"uppercase",whiteSpace:"nowrap",
  }}>{children}</span>
);

const IntensityDots = ({level}) => (
  <div style={{display:"flex",gap:3,alignItems:"center"}}>
    {[1,2,3,4,5].map(i=>(
      <div key={i} style={{
        width:7,height:7,borderRadius:"50%",
        background:i<=level?(level<=2?"#1e90ff":level<=3?"#f59e0b":level<=4?"#f97316":"#ef4444"):C.border,
      }}/>
    ))}
  </div>
);

const StatBox = ({label,value,sub,accent}) => (
  <div style={{
    background:C.card,border:`1px solid ${C.border}`,borderRadius:12,
    padding:"16px 12px",flex:1,minWidth:80,borderTop:`3px solid ${accent||C.blue}`,
  }}>
    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,color:accent||C.blue,lineHeight:1}}>{value}</div>
    <div style={{fontSize:10,color:C.muted,marginTop:4,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
    {sub&&<div style={{fontSize:10,color:C.dim,marginTop:1}}>{sub}</div>}
  </div>
);

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
const Dashboard = ({history,setTab,setActiveDay,bodyWeights,setBodyWeights}) => {
  const [bwInput,setBwInput]=useState("");

  const logWeight=()=>{
    const w=parseFloat(bwInput);
    if(!w||w<30||w>300){setBwInput("");return;}
    const today=todayStr();
    setBodyWeights(prev=>{
      const filtered=prev.filter(e=>e.date!==today);
      return [...filtered,{date:today,weight:w}].sort((a,b)=>a.date.localeCompare(b.date));
    });
    setBwInput("");
  };

  const sortedBW=[...bodyWeights].sort((a,b)=>a.date.localeCompare(b.date));
  const currentBW=sortedBW.length?sortedBW[sortedBW.length-1].weight:98;
  const lost=+(98-currentBW).toFixed(1);
  const pctDone=Math.min((lost/18)*100,100);

  const streak = (() => {
    if(!history.length)return 0;
    const dates=[...new Set(history.map(h=>h.date))].sort().reverse();
    let s=0,cur=new Date();
    for(const d of dates){
      const diff=Math.round((cur-new Date(d))/86400000);
      if(diff<=1){s++;cur=new Date(d);}else break;
    }
    return s;
  })();
  const thisWeek=history.filter(h=>{
    const d=new Date(h.date),now=new Date(),start=new Date(now);
    start.setDate(now.getDate()-now.getDay());return d>=start;
  }).length;
  const allEx=PROGRAM.flatMap(d=>d.exercises);
  const prs={};
  history.forEach(h=>h.sets.forEach(s=>{
    if(!s.done)return;
    if(!prs[s.exId]||s.weight>prs[s.exId].weight)
      prs[s.exId]={weight:s.weight,reps:s.reps,date:h.date};
  }));
  const topPRs=Object.entries(prs)
    .map(([id,v])=>({...v,name:allEx.find(e=>e.id===id)?.name||id,muscle:allEx.find(e=>e.id===id)?.muscle}))
    .sort((a,b)=>b.weight-a.weight).slice(0,3);

  return (
    <div style={{padding:"0 16px 100px"}}>
      <div style={{
        background:`linear-gradient(135deg,${C.blue}18 0%,#8b5cf618 100%)`,
        border:`1px solid ${C.blue}33`,borderRadius:14,padding:"14px 18px",marginBottom:20,
        display:"flex",justifyContent:"space-between",alignItems:"center",
      }}>
        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,color:C.blue,letterSpacing:2,textTransform:"uppercase"}}>Goal · 3 Months</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginTop:2}}>
            98 kg → <span style={{color:C.green}}>80 kg</span>
          </div>
          <div style={{fontSize:11,color:C.muted,marginTop:4}}>PPL + Upper + Lower · 5 days/week</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>Target</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,color:C.yellow}}>−18 kg</div>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <StatBox label="Streak" value={`${streak}🔥`} sub="days" accent={C.yellow}/>
        <StatBox label="This Week" value={thisWeek} sub="sessions" accent={C.green}/>
        <StatBox label="Total" value={history.length} sub="workouts" accent={C.blue}/>
      </div>

      {/* ── Weight Log ── */}
      <div style={{background:C.card,border:`1px solid ${C.blue}44`,borderRadius:12,padding:"13px 15px",marginBottom:16}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,letterSpacing:2,textTransform:"uppercase",color:C.blue,marginBottom:10}}>⚖️ Log Today's Weight</div>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
          <input type="number" value={bwInput} onChange={e=>setBwInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&logWeight()}
            placeholder="e.g. 96.5"
            style={{flex:1,background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:16,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}/>
          <span style={{fontSize:13,color:C.muted,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>kg</span>
          <button onClick={logWeight} style={{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14,cursor:"pointer",letterSpacing:.5}}>LOG</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:12,color:C.muted}}>Current: <span style={{color:C.blue,fontWeight:700}}>{currentBW} kg</span></span>
          <span style={{fontSize:12,color:C.green}}>−{lost} kg lost · {(18-lost).toFixed(1)} kg to go</span>
        </div>
        <div style={{background:C.card2,borderRadius:6,height:8,overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:6,background:`linear-gradient(90deg,${C.blue},${C.green})`,width:`${pctDone}%`,transition:"width .8s ease"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
          <span style={{fontSize:9,color:C.dim}}>Start: 98 kg</span>
          <span style={{fontSize:9,color:C.dim,color:C.green}}>{pctDone.toFixed(0)}% to goal</span>
          <span style={{fontSize:9,color:C.dim}}>Goal: 80 kg</span>
        </div>
        {sortedBW.length>0&&(
          <div style={{display:"flex",gap:5,marginTop:8,overflowX:"auto",paddingBottom:2}}>
            {[...sortedBW].reverse().slice(0,6).map((e,i)=>(
              <div key={i} style={{background:C.card2,border:`1px solid ${i===0?C.blue:C.border}`,borderRadius:6,padding:"4px 8px",flexShrink:0,textAlign:"center"}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:900,color:i===0?C.blue:C.text,lineHeight:1}}>{e.weight}<span style={{fontSize:9}}>kg</span></div>
                <div style={{fontSize:9,color:C.dim,marginTop:1}}>{fmt(e.date)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Weekly Plan — Quick Launch</div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:26}}>
        {PROGRAM.map(day=>(
          <button key={day.id} onClick={()=>{setActiveDay(day.id);setTab("workout");}}
            style={{
              background:C.card,border:`1px solid ${day.color}33`,borderLeft:`4px solid ${day.color}`,
              borderRadius:10,padding:"11px 14px",cursor:"pointer",display:"flex",
              alignItems:"center",gap:12,textAlign:"left",transition:"background .15s",
            }}
            onMouseEnter={e=>e.currentTarget.style.background=C.card2}
            onMouseLeave={e=>e.currentTarget.style.background=C.card}
          >
            <span style={{fontSize:20}}>{day.icon}</span>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,color:day.color,letterSpacing:2}}>{day.label} · {day.dayTag}</span>
                <IntensityDots level={day.intensity}/>
              </div>
              <div style={{fontSize:13,color:C.text}}>{day.name}</div>
            </div>
            <div style={{color:C.muted,fontSize:20}}>›</div>
          </button>
        ))}
      </div>

      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Top Personal Records</div>
      {topPRs.length===0&&<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"20px 0"}}>Complete workouts to unlock PRs 🏆</div>}
      {topPRs.map((pr,i)=>(
        <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 15px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,color:C.yellow,width:30}}>#{i+1}</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:800}}>{pr.name}</div>
            <div style={{display:"flex",gap:6,marginTop:3}}>
              <Badge color={MUSCLE_COLORS[pr.muscle]||C.blue} small>{pr.muscle}</Badge>
              <span style={{fontSize:11,color:C.muted}}>{fmt(pr.date)}</span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,color:C.yellow}}>{pr.weight}<span style={{fontSize:12,fontWeight:400}}>kg</span></div>
            <div style={{fontSize:11,color:C.muted}}>{pr.reps} reps</div>
          </div>
        </div>
      ))}
    </div>
  );
};

// ── WORKOUT ───────────────────────────────────────────────────────────────────
const Workout = ({history,setHistory,activeDay,setActiveDay}) => {
  const day=PROGRAM.find(d=>d.id===activeDay)||PROGRAM[0];
  const initSets=(d)=>d.exercises.filter(ex=>!d.isRest).map(ex=>Array.from({length:ex.sets},(_,i)=>({set:i+1,weight:"",reps:"",done:false})));
  const [trackedDayId,setTrackedDayId]=useState(activeDay);
  const [started,setStarted]=useState(false);
  const [elapsed,setElapsed]=useState(0);
  const [sets,setSets]=useState(()=>initSets(day));
  const [showCardio,setShowCardio]=useState(false);
  // Rest timer
  const [restTimer,setRestTimer]=useState(null); // {secs, total, exName}
  const restRef=useRef(null);
  const timerRef=useRef(null);

  // Derive safe sets — if activeDay just changed, use fresh sets immediately (before effect fires)
  const safeSets = trackedDayId===activeDay ? sets : initSets(day);

  useEffect(()=>{
    if(trackedDayId!==activeDay){
      setTrackedDayId(activeDay);
      setSets(initSets(day));
      setStarted(false);
      setElapsed(0);
    }
  },[activeDay]);

  useEffect(()=>{
    if(started)timerRef.current=setInterval(()=>setElapsed(e=>e+1),1000);
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[started]);

  // Rest timer countdown
  useEffect(()=>{
    if(restTimer&&restTimer.secs>0){
      restRef.current=setTimeout(()=>setRestTimer(t=>t?{...t,secs:t.secs-1}:null),1000);
    } else if(restTimer&&restTimer.secs===0){
      setRestTimer(null);
    }
    return()=>clearTimeout(restRef.current);
  },[restTimer]);

  const prevSession=history.filter(h=>h.dayId===day.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
  const getPrev=(exId,setN)=>prevSession?.sets.find(s=>s.exId===exId&&s.set===setN)||null;
  const updateSet=(exIdx,si,field,val)=>setSets(prev=>{const n=prev.map(e=>[...e]);n[exIdx][si]={...n[exIdx][si],[field]:val};return n;});
  const toggleDone=(exIdx,si,exRestSec)=>{
    setSets(prev=>{
      const n=prev.map(e=>[...e]);
      const nowDone=!n[exIdx][si].done;
      n[exIdx][si]={...n[exIdx][si],done:nowDone};
      // Start rest timer when set is marked done
      if(nowDone&&exRestSec){
        setRestTimer({secs:exRestSec,total:exRestSec,exName:day.exercises[exIdx]?.name||""});
      } else if(!nowDone){
        setRestTimer(null);
      }
      return n;
    });
  };
  const addSet=(exIdx)=>setSets(prev=>{const n=prev.map(e=>[...e]);n[exIdx]=[...n[exIdx],{set:n[exIdx].length+1,weight:"",reps:"",done:false}];return n;});

  const finish=()=>{
    const flatSets=safeSets.flatMap((exSets,i)=>exSets.filter(s=>s.done&&s.weight!=="").map(s=>({exId:day.exercises[i].id,set:s.set,weight:parseFloat(s.weight)||0,reps:s.reps,done:true})));
    if(!flatSets.length){alert("Log at least one completed set first!");return;}
    setHistory(prev=>[...prev,{id:`h${Date.now()}`,dayId:day.id,date:todayStr(),duration:elapsed,sets:flatSets}]);
    setStarted(false);setElapsed(0);setSets(initSets(day));setRestTimer(null);
    alert("💪 Workout saved!");
  };

  const timerColor=elapsed>3600?C.red:elapsed>1800?C.yellow:started?C.green:C.muted;

  return (
    <div style={{padding:"0 16px 100px"}}>
      <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {PROGRAM.map(d=>(
          <button key={d.id} onClick={()=>setActiveDay(d.id)}
            style={{
              background:d.id===activeDay?d.color:C.card,
              color:d.id===activeDay?"#000":C.muted,
              border:`1px solid ${d.id===activeDay?d.color:C.border}`,
              borderRadius:7,padding:"5px 12px",cursor:"pointer",
              fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,
              whiteSpace:"nowrap",letterSpacing:.5,
            }}
          >{d.label}</button>
        ))}
      </div>

      <div style={{background:C.card,border:`1px solid ${day.color}44`,borderTop:`4px solid ${day.color}`,borderRadius:14,padding:"15px 17px",marginBottom:13}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,color:day.color,letterSpacing:2,textTransform:"uppercase"}}>{day.dayTag}</span>
              <IntensityDots level={day.intensity}/>
            </div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,lineHeight:1.1}}>{day.name}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:4}}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:900,color:timerColor,letterSpacing:1}}>{fmtTime(elapsed)}</div>
        </div>
        <div style={{fontSize:11,color:day.color,marginBottom:12,fontStyle:"italic"}}>⚡ {day.note}</div>
        <div style={{display:"flex",gap:8}}>
          {!day.isRest&&(!started
            ?<button onClick={()=>setStarted(true)} style={{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"9px 22px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14,cursor:"pointer",letterSpacing:1}}>▶ START</button>
            :<>
              <button onClick={finish} style={{background:C.green,color:"#000",border:"none",borderRadius:8,padding:"9px 22px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14,cursor:"pointer"}}>✓ FINISH</button>
              <button onClick={()=>{setStarted(false);setElapsed(0);setRestTimer(null);}} style={{background:"transparent",color:C.red,border:`1px solid ${C.red}44`,borderRadius:8,padding:"9px 14px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer"}}>DISCARD</button>
            </>
          )}
        </div>
      </div>

      {/* ── Rest Timer Banner ── */}
      {restTimer&&(
        <div style={{background:`linear-gradient(135deg,${C.blue}22,#8b5cf622)`,border:`1px solid ${restTimer.secs<=10?C.green:C.blue}88`,borderRadius:12,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>Rest — {restTimer.exName}</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:36,fontWeight:900,color:restTimer.secs<=10?C.green:C.blue,lineHeight:1}}>{fmtTime(restTimer.secs)}</div>
            <div style={{background:C.card2,borderRadius:4,height:5,marginTop:6,overflow:"hidden"}}>
              <div style={{height:"100%",borderRadius:4,background:restTimer.secs<=10?C.green:C.blue,width:`${(restTimer.secs/restTimer.total)*100}%`,transition:"width 1s linear"}}/>
            </div>
          </div>
          <button onClick={()=>setRestTimer(null)} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 14px",color:C.muted,fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,cursor:"pointer"}}>SKIP</button>
        </div>
      )}

      {/* Rest day screen */}
      {day.isRest?(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"32px 20px",textAlign:"center",marginTop:8}}>
          <div style={{fontSize:48,marginBottom:12}}>😴</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,marginBottom:8}}>Rest Day</div>
          <div style={{fontSize:13,color:C.muted,lineHeight:1.7,marginBottom:20}}>Your muscles grow during rest, not during training.<br/>Today's job: eat well, sleep 7–9 hrs, stay mobile.</div>
          {[
            "10 min walk outside",
            "Foam roll quads, hamstrings, upper back",
            "Hip flexor stretch 45 s each side",
            "Deep breathing or meditation 5 min",
          ].map((r,i)=>(
            <div key={i} style={{fontSize:13,color:C.muted,padding:"6px 0",borderBottom:i<3?`1px solid ${C.border}`:"none",textAlign:"left"}}>✦ {r}</div>
          ))}
        </div>
      ):(
        <>
      {day.warmup.length>0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:11}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:800,color:C.yellow,letterSpacing:2,marginBottom:8,textTransform:"uppercase"}}>🌡 Warm-Up</div>
        {day.warmup.map((w,i)=>(
          <div key={i} style={{fontSize:12,color:C.muted,padding:"3px 0",borderBottom:i<day.warmup.length-1?`1px solid ${C.border}`:"none"}}>• {w}</div>
        ))}
      </div>}

      {day.exercises.map((ex,exIdx)=>{
        // Overload reminder: check last 2 sessions for this exercise hitting top of rep range
        const topRep = parseInt((ex.reps||"").toString().split("-").pop()) || 0;
        const lastTwoSessions = history.filter(h=>h.dayId===day.id).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,2);
        const hitTopRepTwice = lastTwoSessions.length===2 && lastTwoSessions.every(h=>{
          const exSets=h.sets.filter(s=>s.exId===ex.id&&s.done);
          return exSets.length>0 && exSets.every(s=>parseInt(s.reps)>=topRep);
        });
        const isLastSet = (si) => si === safeSets[exIdx].length - 1;

        return (
          <div key={ex.id} style={{background:C.card,border:`1px solid ${hitTopRepTwice?C.yellow+"88":C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:10}}>
            {/* Header row */}
            <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:800,flex:1,lineHeight:1.2}}>{ex.name}</div>
              <Badge color={MUSCLE_COLORS[ex.muscle]||C.blue}>{ex.muscle}</Badge>
            </div>
            {/* Tempo + badges row */}
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8,alignItems:"center"}}>
              {ex.tempo&&(
                <div style={{background:"#ffffff0d",border:`1px solid ${C.border}`,borderRadius:5,padding:"2px 8px",display:"flex",alignItems:"center",gap:4}}>
                  <span style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>Tempo</span>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:900,color:C.blue,letterSpacing:1}}>{ex.tempo}</span>
                  <span style={{fontSize:9,color:C.dim}}>ecc-pause-con-pause</span>
                </div>
              )}
              {ex.restPause&&(
                <div style={{background:"#ec489922",border:`1px solid #ec489955`,borderRadius:5,padding:"2px 8px"}}>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,color:"#ec4899",letterSpacing:.5}}>⚡ REST-PAUSE on set {ex.sets}</span>
                </div>
              )}
            </div>
            {/* Overload reminder */}
            {hitTopRepTwice&&ex.overload&&(
              <div style={{background:C.yellow+"15",border:`1px solid ${C.yellow}55`,borderRadius:7,padding:"7px 10px",marginBottom:9,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>📈</span>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:800,color:C.yellow}}>ADD +2.5 KG TODAY</div>
                  <div style={{fontSize:11,color:C.muted}}>You hit {topRep} reps for 2 sessions in a row. Time to progress.</div>
                </div>
              </div>
            )}
            {ex.note&&<div style={{fontSize:11,color:C.blue,marginBottom:8,fontStyle:"italic",lineHeight:1.4}}>📌 {ex.note}</div>}
            {/* Set table header */}
            <div style={{display:"grid",gridTemplateColumns:"26px 1fr 66px 66px 34px",gap:5,marginBottom:5}}>
              {["Set","Prev","kg","Reps","✓"].map((h,i)=>(
                <div key={i} style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:.8,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{h}</div>
              ))}
            </div>
            {safeSets[exIdx].map((s,si)=>{
              const prev=getPrev(ex.id,s.set);
              const isRP=ex.restPause&&isLastSet(si);
              return (
                <div key={si}>
                  <div style={{display:"grid",gridTemplateColumns:"26px 1fr 66px 66px 34px",gap:5,marginBottom:isRP?2:5,alignItems:"center",background:s.done?(isRP?"#ec489915":C.green+"0f"):"transparent",borderRadius:6,padding:"3px 0",border:isRP?`1px solid #ec489933`:"1px solid transparent"}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14,color:s.done?(isRP?"#ec4899":C.green):isRP?"#ec4899":C.muted}}>
                      {isRP?"⚡":s.set}
                    </div>
                    <div style={{fontSize:11,color:C.dim}}>{prev?`${prev.weight}×${prev.reps}`:"—"}</div>
                    <input type="number" value={s.weight} onChange={e=>updateSet(exIdx,si,"weight",e.target.value)} placeholder="0"
                      style={{background:C.card2,border:`1px solid ${s.done?(isRP?"#ec489955":C.green+"55"):C.border}`,borderRadius:6,padding:"5px 6px",color:C.text,fontSize:14,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,width:"100%"}}/>
                    <input type="number" value={s.reps} onChange={e=>updateSet(exIdx,si,"reps",e.target.value)} placeholder="0"
                      style={{background:C.card2,border:`1px solid ${s.done?(isRP?"#ec489955":C.green+"55"):C.border}`,borderRadius:6,padding:"5px 6px",color:C.text,fontSize:14,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,width:"100%"}}/>
                    <button onClick={()=>toggleDone(exIdx,si,ex.restSec)} style={{background:s.done?(isRP?"#ec4899":C.green):C.card2,border:`1px solid ${s.done?(isRP?"#ec4899":C.green):C.border}`,borderRadius:6,width:34,height:34,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",color:s.done?"#000":C.dim,fontWeight:900}}>{s.done?"✓":""}</button>
                  </div>
                  {isRP&&!s.done&&(
                    <div style={{fontSize:10,color:"#ec4899",paddingLeft:4,marginBottom:5,fontStyle:"italic"}}>Rest 15 s after completing, then squeeze 3–5 bonus reps</div>
                  )}
                </div>
              );
            })}
            <button onClick={()=>addSet(exIdx)} style={{background:"transparent",border:`1px dashed ${C.border}`,borderRadius:6,padding:"5px 12px",color:C.muted,fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:700,cursor:"pointer",marginTop:2,letterSpacing:1}}>+ ADD SET</button>
          </div>
        );
      })}

      <button onClick={()=>setShowCardio(!showCardio)} style={{background:"#ef444411",border:`1px solid #ef444433`,borderRadius:12,padding:"11px 14px",width:"100%",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:13,color:"#ef4444",letterSpacing:1,textTransform:"uppercase",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span>🏃 Cardio Plan</span><span>{showCardio?"▲":"▼"}</span>
      </button>
      {showCardio&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px",marginBottom:11}}>
          {CARDIO_PLAN.map((c,i)=>(
            <div key={i} style={{marginBottom:i<CARDIO_PLAN.length-1?11:0,paddingBottom:i<CARDIO_PLAN.length-1?11:0,borderBottom:i<CARDIO_PLAN.length-1?`1px solid ${C.border}`:"none"}}>
              <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:3}}>
                <Badge color="#ef4444">Wk {c.week}</Badge>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:800}}>{c.type}</span>
              </div>
              <div style={{fontSize:12,color:C.muted}}>{c.duration} · {c.machine} · {c.intensity}</div>
              <div style={{fontSize:11,color:C.dim,marginTop:1}}>{c.note}</div>
            </div>
          ))}
        </div>
      )}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 14px"}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:800,color:"#8b5cf6",letterSpacing:2,marginBottom:8,textTransform:"uppercase"}}>🧘 Cool-Down</div>
        {day.cooldown.map((w,i)=>(
          <div key={i} style={{fontSize:12,color:C.muted,padding:"3px 0",borderBottom:i<day.cooldown.length-1?`1px solid ${C.border}`:"none"}}>• {w}</div>
        ))}
      </div>
      </>)}
    </div>
  );
};

// ── HISTORY ───────────────────────────────────────────────────────────────────
const History = ({history}) => {
  const allEx=PROGRAM.flatMap(d=>d.exercises);
  const prs={};
  [...history].sort((a,b)=>a.date.localeCompare(b.date)).forEach(h=>{h.sets.forEach(s=>{if(!prs[s.exId]||s.weight>prs[s.exId])prs[s.exId]=s.weight;});});
  return (
    <div style={{padding:"0 16px 100px"}}>
      {[...history].reverse().map(h=>{
        const day=PROGRAM.find(d=>d.id===h.dayId);
        const muscles=[...new Set(h.sets.map(s=>allEx.find(e=>e.id===s.exId)?.muscle).filter(Boolean))];
        const prSets=h.sets.filter(s=>s.weight&&s.weight>=(prs[s.exId]||0));
        return (
          <div key={h.id} style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${day?.color||C.blue}`,borderRadius:12,padding:"12px 14px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                  {day&&<Badge color={day.color}>{day.dayTag}</Badge>}
                  {prSets.length>0&&<span>🏆</span>}
                </div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:800}}>{day?.name||"Workout"}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:1}}>{fmt(h.date)}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:800,color:C.blue}}>{fmtTime(h.duration)}</div>
                <div style={{fontSize:11,color:C.muted}}>{h.sets.length} sets</div>
              </div>
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:prSets.length?7:0}}>
              {muscles.map(m=><Badge key={m} color={MUSCLE_COLORS[m]||C.blue} small>{m}</Badge>)}
            </div>
            {prSets.length>0&&<div style={{fontSize:11,color:C.yellow,marginTop:6}}>🏆 {prSets.map(s=>`${allEx.find(e=>e.id===s.exId)?.name} ${s.weight}kg`).join(" · ")}</div>}
          </div>
        );
      })}
      {!history.length&&<div style={{color:C.muted,textAlign:"center",marginTop:60,fontSize:14,lineHeight:2}}>No workouts yet.<br/>Hit Start on your first session! 💪</div>}
    </div>
  );
};

// ── PROGRESS sub-components (must be outside Progress to avoid iOS transpiler bug) ──
const BWSpark = ({sortedBW, goalBW, C}) => {
  if(sortedBW.length<2) return <div style={{color:C.dim,fontSize:11,padding:"8px 0"}}>Log at least 2 entries to see trend</div>;
  const W=300,H=60;
  const ws=sortedBW.map(p=>p.weight);
  const mn=Math.min(...ws,goalBW)-0.5, mx=Math.max(...ws)+0.5, range=mx-mn||1;
  const xs=sortedBW.map((_,i)=>(i/(sortedBW.length-1))*W);
  const ys=sortedBW.map(p=>H-((p.weight-mn)/range)*(H-10)-5);
  const goalY=H-((goalBW-mn)/range)*(H-10)-5;
  const path=xs.map((x,i)=>`${i===0?"M":"L"} ${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(" ");
  const area=`${path} L ${xs[xs.length-1]} ${H} L 0 ${H} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible",display:"block"}}>
      <defs>
        <linearGradient id="bwfill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={C.blue} stopOpacity=".25"/>
          <stop offset="100%" stopColor={C.blue} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <line x1="0" y1={goalY} x2={W} y2={goalY} stroke={C.green} strokeWidth="1" strokeDasharray="4,3" opacity=".6"/>
      <text x="4" y={goalY-3} fontSize="8" fill={C.green} opacity=".8">Goal 80kg</text>
      <path d={area} fill="url(#bwfill)"/>
      <path d={path} fill="none" stroke={C.blue} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {sortedBW.map((p,i)=>(
        <circle key={i} cx={xs[i]} cy={ys[i]} r="3.5" fill={C.blue}/>
      ))}
      <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="6" fill={C.blue} opacity=".2"/>
    </svg>
  );
};

const Sparkline = ({pts, color}) => {
  if(pts.length<2) return <div style={{color:"#3d4452",fontSize:11,padding:"8px 0"}}>Log more sessions to see trend</div>;
  const W=240,H=44;
  const ws=pts.map(p=>p.weight),mn=Math.min(...ws),mx=Math.max(...ws),range=mx-mn||1;
  const xs=pts.map((_,i)=>(i/(pts.length-1))*W);
  const ys=pts.map(p=>H-((p.weight-mn)/range)*(H-8)-4);
  const path=xs.map((x,i)=>`${i===0?"M":"L"} ${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(" ");
  const area=`${path} L ${xs[xs.length-1]} ${H} L 0 ${H} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible",display:"block"}}>
      <defs>
        <linearGradient id={`fill${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity=".2"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#fill${color.replace("#","")})`}/>
      <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="4.5" fill={color}/>
      <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="8" fill={color} opacity=".15"/>
    </svg>
  );
};

// ── PROGRESS ──────────────────────────────────────────────────────────────────
const Progress = ({history, bodyWeights, setBodyWeights}) => {
  const [bwInput,setBwInput]=useState("");
  const allEx=PROGRAM.flatMap(d=>d.exercises);

  const sortedBW=[...bodyWeights].sort((a,b)=>a.date.localeCompare(b.date));
  const currentBW=sortedBW.length?sortedBW[sortedBW.length-1].weight:98;
  const startBW=98, goalBW=80;
  const lost=+(startBW-currentBW).toFixed(1);
  const remaining=+(currentBW-goalBW).toFixed(1);
  const pctDone=Math.min((lost/(startBW-goalBW))*100,100);

  const logWeight=()=>{
    const w=parseFloat(bwInput);
    if(!w||w<30||w>300){setBwInput("");return;}
    const today=todayStr();
    setBodyWeights(prev=>{
      const filtered=prev.filter(e=>e.date!==today);
      return [...filtered,{date:today,weight:w}].sort((a,b)=>a.date.localeCompare(b.date));
    });
    setBwInput("");
  };

  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-28);
  const weeklyVol={};
  Object.keys(MUSCLE_COLORS).forEach(m=>weeklyVol[m]=0);
  history.filter(h=>new Date(h.date)>=cutoff).forEach(h=>{
    h.sets.forEach(s=>{
      const ex=allEx.find(e=>e.id===s.exId);
      if(ex&&s.done&&s.weight)weeklyVol[ex.muscle]=(weeklyVol[ex.muscle]||0)+(s.weight*(parseInt(s.reps)||8));
    });
  });
  const maxVol=Math.max(...Object.values(weeklyVol),1);
  const KEY=[{id:"e1"},{id:"e7"},{id:"e13"},{id:"e10"},{id:"e4"},{id:"e17"},{id:"e26"}];

  return (
    <div style={{padding:"0 16px 100px"}}>

      {/* ── Body Weight Tracker ── */}
      <div style={{background:C.card,border:`1px solid ${C.blue}44`,borderTop:`4px solid ${C.blue}`,borderRadius:14,padding:"15px",marginBottom:16}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,letterSpacing:2,textTransform:"uppercase",color:C.blue,marginBottom:12}}>⚖️ Body Weight — 98 → 80 kg</div>
        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {label:"Current",  val:`${currentBW}kg`, color:C.blue},
            {label:"Lost",     val:`−${lost}kg`,     color:C.green},
            {label:"To Go",    val:`${remaining}kg`, color:C.yellow},
          ].map(({label,val,color})=>(
            <div key={label} style={{background:C.card2,borderRadius:8,padding:"8px 6px",textAlign:"center",border:`1px solid ${color}33`}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:900,color,lineHeight:1}}>{val}</div>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:.8,marginTop:2}}>{label}</div>
            </div>
          ))}
        </div>
        {/* Progress bar */}
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:.8}}>Goal Progress</span>
            <span style={{fontSize:10,color:C.green}}>{pctDone.toFixed(1)}%</span>
          </div>
          <div style={{background:C.card2,borderRadius:6,height:10,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:6,background:`linear-gradient(90deg,${C.blue},${C.green})`,width:`${pctDone}%`,transition:"width .8s ease"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
            <span style={{fontSize:9,color:C.dim}}>98 kg</span>
            <span style={{fontSize:9,color:C.dim}}>80 kg</span>
          </div>
        </div>
        {/* Sparkline */}
        <BWSpark sortedBW={sortedBW} goalBW={goalBW} C={C}/>
        {/* Entry row */}
        <div style={{display:"flex",gap:8,marginTop:12,alignItems:"center"}}>
          <input type="number" value={bwInput} onChange={e=>setBwInput(e.target.value)}
            placeholder="Today's weight (kg)"
            style={{flex:1,background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:14,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}/>
          <button onClick={logWeight} style={{background:C.blue,color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:13,cursor:"pointer",letterSpacing:.5,whiteSpace:"nowrap"}}>LOG ＋</button>
        </div>
        {/* Recent entries */}
        {sortedBW.length>0&&(
          <div style={{marginTop:10,display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
            {[...sortedBW].reverse().slice(0,7).map((e,i)=>(
              <div key={i} style={{background:C.card2,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",flexShrink:0,textAlign:"center"}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:900,color:i===0?C.blue:C.text}}>{e.weight}<span style={{fontSize:9}}>kg</span></div>
                <div style={{fontSize:9,color:C.dim}}>{fmt(e.date)}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      {/* ── Volume by Muscle ── */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"15px",marginBottom:20}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,letterSpacing:2,textTransform:"uppercase",color:C.muted,marginBottom:14}}>4-Week Volume by Muscle Group</div>
        {Object.keys(MUSCLE_COLORS).filter(m=>m!=="Cardio").map(m=>{
          const vol=weeklyVol[m]||0,pct=Math.max((vol/maxVol)*100,vol>0?2:0);
          return (
            <div key={m} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,color:MUSCLE_COLORS[m],fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{m}</span>
                <span style={{fontSize:11,color:C.muted}}>{vol.toFixed(0)}</span>
              </div>
              <div style={{background:C.card2,borderRadius:4,height:8,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:4,background:`linear-gradient(90deg,${MUSCLE_COLORS[m]}88,${MUSCLE_COLORS[m]})`,width:`${pct}%`,transition:"width .7s ease"}}/>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,color:C.muted,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Exercise Trends</div>
      {KEY.map(({id})=>{
        const ex=allEx.find(e=>e.id===id);if(!ex)return null;
        const pts=history.flatMap(h=>h.sets.filter(s=>s.exId===id&&s.done&&s.weight).map(s=>({date:h.date,weight:parseFloat(s.weight)||0}))).sort((a,b)=>a.date.localeCompare(b.date));
        const pr=pts.length?Math.max(...pts.map(p=>p.weight)):0;
        const color=MUSCLE_COLORS[ex.muscle]||C.blue;
        const trend=pts.length>=2?pts[pts.length-1].weight-pts[0].weight:0;
        return (
          <div key={id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"13px 14px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:800,marginBottom:4}}>{ex.name}</div>
                <Badge color={color} small>{ex.muscle}</Badge>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,color:C.yellow,lineHeight:1}}>{pr||"—"}{pr?<span style={{fontSize:12,fontWeight:400}}>kg</span>:""}</div>
                <div style={{fontSize:10,color:C.muted}}>PR</div>
                {trend!==0&&<div style={{fontSize:11,color:trend>0?C.green:C.red,marginTop:2}}>{trend>0?"+":""}{trend.toFixed(1)}kg</div>}
              </div>
            </div>
            <Sparkline pts={pts} color={color}/>
            <div style={{fontSize:10,color:C.dim,marginTop:5}}>{pts.length} logged · {pts.length>=2?`${fmt(pts[0].date)} → ${fmt(pts[pts.length-1].date)}`:"Start logging to see trend"}</div>
          </div>
        );
      })}
    </div>
  );
};
